<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operazione Moro — Roma 1978</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1208;
    --paper: #f0e6c8;
    --paper-dark: #d9cc9a;
    --surface: #231a0a;
    --surface2: #2e2210;
    --border: #6b4c1e;
    --red: #c0152a;
    --red-dim: #8a0f1e;
    --text: #f0e6c8;
    --text-dark: #1a1208;
    --muted: #a08050;
    --ink: #1a1208;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Courier Prime', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(255,255,255,0.015) 28px, rgba(255,255,255,0.015) 29px),
      repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(255,255,255,0.01) 28px, rgba(255,255,255,0.01) 29px);
  }

  /* ── HEADER ── */
  header { background: var(--red); position: relative; overflow: hidden; }
  .header-rule { height: 4px; background: var(--bg); }
  .header-rule-thin { height: 1px; background: rgba(0,0,0,0.3); margin-top: 2px; }
  .header-inner {
    display: flex; flex-direction: column; align-items: center;
    padding: 1.2rem 1rem 1rem; position: relative; z-index: 1;
  }
  .header-eyebrow {
    font-size: 0.6rem; letter-spacing: 0.25em;
    color: rgba(240,230,200,0.6); text-transform: uppercase; margin-bottom: 0.3rem;
  }
  .header-title {
    font-family: 'Special Elite', cursive;
    font-size: 1.7rem; color: var(--paper);
    text-shadow: 2px 2px 0 rgba(0,0,0,0.4); letter-spacing: 0.03em;
  }
  .header-sub {
    font-size: 0.62rem; color: rgba(240,230,200,0.55);
    letter-spacing: 0.2em; margin-top: 0.4rem; text-transform: uppercase;
  }
  header::after {
    content: '★';
    position: absolute; right: -10px; top: -10px;
    font-size: 120px; color: rgba(0,0,0,0.12); line-height: 1; pointer-events: none;
  }

  /* ── LAYOUT ── */
  .student-layout { max-width: 600px; margin: 0 auto; padding: 1.5rem; }

  /* ── MISSION LIST HEADER ── */
  .student-header { text-align: center; margin-bottom: 1.5rem; margin-top: 1.2rem; }
  .classified-stamp {
    display: inline-block; border: 3px solid var(--red); color: var(--red);
    font-family: 'Special Elite', cursive; font-size: 1rem; letter-spacing: 0.15em;
    padding: 0.2rem 0.8rem; transform: rotate(-2deg); opacity: 0.85; margin-bottom: 0.8rem;
  }
  .student-header h2 { font-family: 'Special Elite', cursive; font-size: 1.4rem; color: var(--paper); letter-spacing: 0.04em; }
  .student-header p { color: var(--muted); font-size: 0.72rem; letter-spacing: 0.1em; margin-top: 0.4rem; text-transform: uppercase; }

  /* ── MISSION CARDS ── */
  .assignment-grid { display: grid; gap: 0.8rem; }
  .student-card {
    background: var(--paper); border: 1px solid var(--paper-dark);
    border-left: 4px solid var(--red); padding: 1rem 1.2rem;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 1rem;
    position: relative; box-shadow: 2px 2px 8px rgba(0,0,0,0.4);
  }
  .student-card:hover { box-shadow: 3px 3px 16px rgba(0,0,0,0.6); transform: translateX(3px); }
  .student-num {
    width: 42px; height: 42px; background: var(--red);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Special Elite', cursive; font-size: 1.1rem;
    color: var(--paper); flex-shrink: 0;
  }
  .student-card-info { flex: 1; }
  .student-card-name { font-family: 'Special Elite', cursive; font-size: 1rem; color: var(--ink); }
  .student-card-desc { font-size: 0.75rem; color: #5a4020; margin-top: 0.3rem; line-height: 1.4; }
  .student-card-mode { font-size: 0.62rem; letter-spacing: 0.1em; margin-top: 0.4rem; text-transform: uppercase; }
  .student-card-mode.compass { color: #8a0f1e; }
  .student-card-mode.map { color: #3a5a20; }
  .card-arrow { font-size: 1.1rem; color: var(--red); flex-shrink: 0; }

  /* ── STATES ── */
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 0.8rem; border: 1px dashed var(--border); letter-spacing: 0.05em; }
  .empty-state .big { font-size: 2rem; margin-bottom: 0.5rem; }
  .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; animation: blink 1.2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── TASK VIEW ── */
  .task-view { display: none; }
  .task-view.active { display: block; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 0.45rem 0.9rem; font-size: 0.7rem; cursor: pointer;
    margin-bottom: 1.5rem; transition: all 0.2s; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .back-btn:hover { border-color: var(--red); color: var(--red); }

  .dossier-card {
    background: var(--paper); border: 1px solid var(--paper-dark);
    box-shadow: 3px 3px 12px rgba(0,0,0,0.5); padding: 1.5rem;
    margin-bottom: 1.5rem; position: relative;
  }
  .dossier-card::before {
    content: 'DOSSIER RISERVATO'; position: absolute; top: 0.6rem; right: 0.8rem;
    font-size: 0.55rem; color: var(--red); opacity: 0.5; letter-spacing: 0.15em;
  }
  .dossier-label { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.3rem; }
  .task-title {
    font-family: 'Special Elite', cursive; font-size: 1.6rem; color: var(--ink);
    margin-bottom: 0.6rem; line-height: 1.2; border-bottom: 2px solid var(--red); padding-bottom: 0.6rem;
  }
  .task-desc { color: #3a2810; font-size: 0.85rem; line-height: 1.7; margin-top: 0.6rem; }

  /* ── DISTANCE ── */
  .compass-container { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
  .distance-display {
    background: var(--paper); border: 1px solid var(--paper-dark);
    box-shadow: 3px 3px 12px rgba(0,0,0,0.5); padding: 1.2rem 2rem; width: 100%; text-align: center; position: relative;
  }
  .distance-display::before {
    content: ''; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px;
    border: 1px solid var(--paper-dark); pointer-events: none;
  }
  .distance-label { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.3rem; }
  .distance-value { font-family: 'Special Elite', cursive; font-size: 4rem; color: var(--red); line-height: 1; }
  .distance-unit-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.2rem; }

  /* ── ACCURACY ── */
  .accuracy-bar-wrap { margin-top: 1rem; border-top: 1px solid var(--paper-dark); padding-top: 0.8rem; }
  .accuracy-label { display: flex; justify-content: space-between; font-size: 0.62rem; color: var(--muted); margin-bottom: 0.4rem; letter-spacing: 0.08em; text-transform: uppercase; }
  .accuracy-track { height: 5px; background: var(--paper-dark); overflow: hidden; }
  .accuracy-fill { height: 100%; transition: width 0.5s ease, background-color 0.5s ease; width: 0%; }

  /* ── ARROW ── */
  .arrow-wrapper { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  .arrow-ring {
    width: 220px; height: 220px; border-radius: 50%;
    background: var(--surface); border: 3px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 6px var(--bg), 0 0 0 7px var(--border), 4px 4px 20px rgba(0,0,0,0.6);
    position: relative;
  }
  .arrow-ring::before { content: ''; position: absolute; inset: 12px; border-radius: 50%; border: 1px dashed rgba(107,76,30,0.4); }
  .arrow-ring::after { content: ''; }
  .arrow-rotate { transition: transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; align-items: center; justify-content: center; }
  .nav-arrow {
    width: 0; height: 0;
    border-left: 24px solid transparent; border-right: 24px solid transparent;
    border-bottom: 96px solid var(--red);
    filter: drop-shadow(0 0 10px rgba(192,21,42,0.5)); position: relative;
  }
  .nav-arrow::after {
    content: ''; position: absolute; bottom: -96px; left: -16px;
    width: 0; height: 0;
    border-left: 16px solid transparent; border-right: 16px solid transparent;
    border-top: 48px solid rgba(192,21,42,0.2);
  }
  .arrow-hint { font-size: 0.68rem; color: var(--muted); text-align: center; max-width: 240px; line-height: 1.6; letter-spacing: 0.06em; text-transform: uppercase; }

  /* ── MAP ── */
  .map-container { background: var(--paper); border: 1px solid var(--paper-dark); box-shadow: 3px 3px 12px rgba(0,0,0,0.5); overflow: hidden; }
  .map-address-bar { padding: 0.9rem 1.2rem; display: flex; align-items: center; gap: 0.8rem; border-bottom: 2px solid var(--red); background: var(--paper); }
  .map-address { font-family: 'Special Elite', cursive; font-size: 0.95rem; color: var(--ink); }
  .map-coords { font-size: 0.68rem; color: var(--muted); margin-top: 0.2rem; letter-spacing: 0.05em; }
  .map-iframe-wrap { width: 100%; height: 300px; }
  .map-iframe-wrap iframe { width: 100%; height: 100%; border: none; filter: sepia(30%) contrast(90%); }
  .maps-link { display: block; text-align: center; margin-top: 1rem; }
  .maps-link a {
    display: inline-block; padding: 0.75rem 1.5rem; background: var(--red); color: var(--paper);
    font-family: 'Special Elite', cursive; font-size: 0.9rem; text-decoration: none;
    letter-spacing: 0.05em; box-shadow: 3px 3px 0 var(--red-dim); transition: all 0.15s;
  }
  .maps-link a:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--red-dim); }

  /* ── PERMISSION ── */
  .permission-box { background: var(--paper); border: 1px solid var(--paper-dark); box-shadow: 3px 3px 12px rgba(0,0,0,0.5); padding: 2rem; text-align: center; }
  .permission-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
  .permission-box h3 { font-family: 'Special Elite', cursive; color: var(--ink); margin-bottom: 0.5rem; font-size: 1.1rem; }
  .permission-box p { color: #5a4020; font-size: 0.8rem; margin-bottom: 1.5rem; line-height: 1.6; }
  .btn-start {
    background: var(--red); color: var(--paper); border: none; padding: 0.85rem 2rem;
    font-family: 'Special Elite', cursive; font-size: 1rem; cursor: pointer;
    box-shadow: 3px 3px 0 var(--red-dim); letter-spacing: 0.05em; transition: all 0.15s;
  }
  .btn-start:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--red-dim); }

  /* ── ARRIVED ── */
  .arrived-banner {
    background: var(--paper); border: 3px solid var(--red);
    padding: 1.8rem 1.5rem 1.5rem; text-align: center; margin-top: 1.5rem;
    box-shadow: 4px 4px 0 var(--red-dim); position: relative;
    animation: pulse-red 2s infinite;
  }
  .arrived-banner::before {
    content: '★  OBIETTIVO RAGGIUNTO  ★';
    position: absolute; top: -0.65rem; left: 50%; transform: translateX(-50%);
    background: var(--red); color: var(--paper);
    font-size: 0.55rem; padding: 0.1rem 0.6rem;
    letter-spacing: 0.15em; white-space: nowrap;
  }
  @keyframes pulse-red {
    0%,100% { box-shadow: 4px 4px 0 var(--red-dim); }
    50% { box-shadow: 4px 4px 0 var(--red-dim), 0 0 24px rgba(192,21,42,0.3); }
  }
  .arrived-icon { font-size: 2rem; color: var(--red); }
  .arrived-title { font-family: 'Special Elite', cursive; font-size: 1.2rem; color: var(--red); margin-top: 0.5rem; }
  .arrived-sub { font-size: 0.75rem; color: #5a4020; margin-top: 0.4rem; }
</style>
</head>
<body>

<header>
  <div class="header-rule"></div>
  <div class="header-rule-thin"></div>
  <div class="header-inner">
    <div class="header-eyebrow">Brigata Investigativa — Roma</div>
    <div class="header-title">Operazione Moro</div>
    <div class="header-sub">Documenti riservati · 1978</div>
  </div>
  <div class="header-rule-thin"></div>
  <div class="header-rule"></div>
</header>

<div class="student-layout">
  <div id="student-picker">
    <div class="student-header">
      <div class="classified-stamp">Riservato</div>
      <h2>Selecteer uw missie</h2>
      <p>Kies een dossier om te beginnen</p>
    </div>
    <div class="assignment-grid" id="student-grid">
      <div class="loading">▋ Dossiers laden...</div>
    </div>
  </div>

  <div id="task-detail" class="task-view">
    <button class="back-btn" onclick="backToList()">← Terug naar overzicht</button>
    <div class="dossier-card">
      <div class="dossier-label">Missie dossier</div>
      <div class="task-title" id="task-title"></div>
      <div class="task-desc" id="task-desc"></div>
    </div>
    <div id="task-content"></div>
  </div>
</div>

<script>
  // Request fullscreen on first interaction (browsers require user gesture)
  document.addEventListener('click', function requestFS() {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    document.removeEventListener('click', requestFS);
  }, { once: true });
</script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC_2gs99Sao2zdxa_JsRd9fNUFg-MVcXgw",
    authDomain: "rome-maffia.firebaseapp.com",
    projectId: "rome-maffia",
    storageBucket: "rome-maffia.firebasestorage.app",
    messagingSenderId: "68269167339",
    appId: "1:68269167339:web:43f9f177f38af954fce4ae",
    measurementId: "G-5J1MY47CG1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let assignments = [], activeAssignment = null;
  let watchId = null, deviceHeading = null, currentLat = null, currentLng = null;
  let gpsLat = null, gpsLng = null, gpsTimestamp = null;
  let gpsSpeed = 0, gpsBearing = null, gpsAccuracy = null, interpFrame = null;

  const q = query(collection(db, "assignments"), orderBy("order", "asc"));
  onSnapshot(q, snapshot => {
    assignments = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderStudentGrid();
  }, err => {
    document.getElementById('student-grid').innerHTML = `<div class="empty-state"><div class="big">⚠</div>Dossiers niet beschikbaar.<br>${err.message}</div>`;
  });

  function renderStudentGrid() {
    const grid = document.getElementById('student-grid');
    if (!assignments.length) {
      grid.innerHTML = `<div class="empty-state"><div class="big">📁</div>Geen dossiers beschikbaar.<br>Vraag uw commandant.</div>`;
      return;
    }
    grid.innerHTML = assignments.map((a, i) => `
      <div class="student-card" onclick="openTask('${a.id}')">
        <div class="student-num">${String(i+1).padStart(2,'0')}</div>
        <div class="student-card-info">
          <div class="student-card-name">${a.name}</div>
          ${a.desc ? `<div class="student-card-desc">${a.desc.substring(0,80)}${a.desc.length>80?'…':''}</div>` : ''}
          <div class="student-card-mode ${a.mode}">
            ${a.mode === 'compass' ? '[ peiling + afstand ]' : '[ locatie zichtbaar ]'}
          </div>
        </div>
        <div class="card-arrow">›</div>
      </div>
    `).join('');
  }

  window.openTask = function(id) {
    activeAssignment = assignments.find(a => a.id === id);
    if (!activeAssignment) return;
    document.getElementById('student-picker').style.display = 'none';
    document.getElementById('task-detail').classList.add('active');
    document.getElementById('task-title').textContent = activeAssignment.name;
    document.getElementById('task-desc').textContent = activeAssignment.desc || '';
    if (activeAssignment.mode === 'compass') renderCompassMode();
    else renderMapMode();
  };

  window.backToList = function() {
    stopTracking();
    document.getElementById('student-picker').style.display = '';
    document.getElementById('task-detail').classList.remove('active');
    activeAssignment = null;
  };

  function renderMapMode() {
    const a = activeAssignment;
    const mapUrl = `https://www.openstreetmap.org/export/embed.html?bbox=${a.lng-0.003},${a.lat-0.003},${a.lng+0.003},${a.lat+0.003}&layer=mapnik&marker=${a.lat},${a.lng}`;
    document.getElementById('task-content').innerHTML = `
      <div class="map-container">
        <div class="map-address-bar">
          <div style="font-size:1.2rem">📍</div>
          <div>
            <div class="map-address">${a.address || 'Locatie onbekend'}</div>
            <div class="map-coords">${a.lat.toFixed(5)}° N · ${a.lng.toFixed(5)}° E</div>
          </div>
        </div>
        <div class="map-iframe-wrap">
          <iframe src="${mapUrl}" loading="lazy"></iframe>
        </div>
      </div>
      <div class="maps-link">
        <a href="https://www.google.com/maps?q=${a.lat},${a.lng}" target="_blank">↗ Open in Google Maps</a>
      </div>`;
  }

  function renderCompassMode() {
    document.getElementById('task-content').innerHTML = `
      <div class="permission-box" id="perm-box">
        <div class="permission-icon">🧭</div>
        <h3>Locatietoegang vereist</h3>
        <p>Om de peiling en afstand te bepalen heeft uw apparaat toegang nodig tot de GPS-locatie.</p>
        <button class="btn-start" onclick="startCompass()">Activeer navigatie</button>
      </div>
      <div class="compass-container" id="compass-ui" style="display:none;">
        <div class="distance-display">
          <div class="distance-label">Afstand tot bewijsmateriaal</div>
          <div class="distance-value" id="dist-val">—</div>
          <div class="distance-unit-label" id="dist-unit">GPS verbinding zoeken...</div>
          <div class="accuracy-bar-wrap" id="accuracy-wrap" style="display:none;">
            <div class="accuracy-label"><span>Signaalsterkte</span><span id="accuracy-text">—</span></div>
            <div class="accuracy-track"><div class="accuracy-fill" id="accuracy-fill"></div></div>
          </div>
        </div>
        <div class="arrow-wrapper">
          <div class="arrow-ring">
            <div class="arrow-rotate" id="arrow-rotate">
              <div class="nav-arrow"></div>
            </div>
          </div>
          <div class="arrow-hint" id="compass-status">▋ Signaal zoeken...</div>
        </div>
        <div id="arrived-wrap"></div>
      </div>`;
  }

  window.startCompass = function() {
    document.getElementById('perm-box').style.display = 'none';
    document.getElementById('compass-ui').style.display = 'flex';
    startTracking();
  };

  function deg2rad(d) { return d * Math.PI / 180; }
  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371000, dLat = deg2rad(lat2-lat1), dLng = deg2rad(lng2-lng1);
    const a = Math.sin(dLat/2)**2 + Math.cos(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  function bearing(lat1, lng1, lat2, lng2) {
    const dLng = deg2rad(lng2-lng1);
    const y = Math.sin(dLng)*Math.cos(deg2rad(lat2));
    const x = Math.cos(deg2rad(lat1))*Math.sin(deg2rad(lat2)) - Math.sin(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.cos(dLng);
    return (Math.atan2(y,x)*180/Math.PI+360)%360;
  }

  function startTracking() {
    if (!navigator.geolocation) return;
    watchId = navigator.geolocation.watchPosition(pos => {
      const newLat = pos.coords.latitude, newLng = pos.coords.longitude;
      gpsAccuracy = pos.coords.accuracy;
      if (gpsLat !== null) {
        const dt = (pos.timestamp - gpsTimestamp) / 1000;
        if (dt > 0) {
          const d = haversine(gpsLat, gpsLng, newLat, newLng);
          gpsSpeed = d / dt;
          if (d > 1) gpsBearing = bearing(gpsLat, gpsLng, newLat, newLng);
        }
      }
      if (pos.coords.heading !== null && !isNaN(pos.coords.heading) && pos.coords.speed > 0.3) {
        deviceHeading = pos.coords.heading; gpsBearing = pos.coords.heading; gpsSpeed = pos.coords.speed;
      }
      gpsLat = newLat; gpsLng = newLng; gpsTimestamp = pos.timestamp;
      currentLat = gpsLat; currentLng = gpsLng;
      updateAccuracyUI(); updateCompassUI(); startInterpolation();
    }, err => {
      const s = document.getElementById('compass-status');
      if (s) { s.textContent = '✗ GPS fout: ' + err.message; s.style.color = '#c0152a'; }
    }, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });

    const handler = e => {
      if (e.webkitCompassHeading !== undefined && e.webkitCompassHeading !== null) deviceHeading = e.webkitCompassHeading;
      else if (e.absolute && e.alpha !== null) deviceHeading = (360 - e.alpha) % 360;
      updateCompassUI();
    };
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(s => { if (s === 'granted') window.addEventListener('deviceorientation', handler, true); });
    } else {
      window.addEventListener('deviceorientationabsolute', handler, true);
      window.addEventListener('deviceorientation', handler, true);
    }
  }

  function startInterpolation() {
    if (interpFrame) cancelAnimationFrame(interpFrame);
    const step = () => {
      if (!gpsLat || !gpsBearing || gpsSpeed < 0.3) return;
      const age = (Date.now() - gpsTimestamp) / 1000;
      if (age > 8) return;
      const R = 6371000, d = gpsSpeed * age;
      const bR = deg2rad(gpsBearing), laR = deg2rad(gpsLat), loR = deg2rad(gpsLng);
      const nlaR = Math.asin(Math.sin(laR)*Math.cos(d/R) + Math.cos(laR)*Math.sin(d/R)*Math.cos(bR));
      const nloR = loR + Math.atan2(Math.sin(bR)*Math.sin(d/R)*Math.cos(laR), Math.cos(d/R)-Math.sin(laR)*Math.sin(nlaR));
      currentLat = nlaR * 180/Math.PI; currentLng = nloR * 180/Math.PI;
      updateCompassUI();
      interpFrame = requestAnimationFrame(step);
    };
    interpFrame = requestAnimationFrame(step);
  }

  function updateAccuracyUI() {
    const wrap = document.getElementById('accuracy-wrap');
    const fill = document.getElementById('accuracy-fill');
    const text = document.getElementById('accuracy-text');
    if (!wrap || !fill || !text || gpsAccuracy === null) return;
    wrap.style.display = 'block';
    const pct = Math.max(0, Math.min(100, 100 - ((gpsAccuracy - 3) / 47) * 100));
    fill.style.width = pct + '%';
    if (gpsAccuracy <= 8) { fill.style.backgroundColor = '#3a7a30'; text.textContent = `Uitstekend (±${Math.round(gpsAccuracy)}m)`; text.style.color = '#3a7a30'; }
    else if (gpsAccuracy <= 20) { fill.style.backgroundColor = '#a07020'; text.textContent = `Redelijk (±${Math.round(gpsAccuracy)}m)`; text.style.color = '#a07020'; }
    else { fill.style.backgroundColor = '#c0152a'; text.textContent = `Zwak (±${Math.round(gpsAccuracy)}m)`; text.style.color = '#c0152a'; }
  }

  function stopTracking() {
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (interpFrame) { cancelAnimationFrame(interpFrame); interpFrame = null; }
    deviceHeading = null; currentLat = null; currentLng = null;
    gpsLat = null; gpsLng = null; gpsTimestamp = null; gpsSpeed = 0; gpsBearing = null;
  }

  function updateCompassUI() {
    if (!activeAssignment || currentLat === null) return;
    const a = activeAssignment;
    const dist = haversine(currentLat, currentLng, a.lat, a.lng);
    const bear = bearing(currentLat, currentLng, a.lat, a.lng);

    const distVal = document.getElementById('dist-val');
    const distUnit = document.getElementById('dist-unit');
    if (distVal) {
      if (dist >= 1000) {
        distVal.textContent = (dist/1000).toFixed(2);
        distUnit.textContent = 'kilometer';
      } else {
        distVal.textContent = Math.round(dist);
        distUnit.textContent = 'meter';
      }
    }

    const arrow = document.getElementById('arrow-rotate');
    if (arrow) arrow.style.transform = `rotate(${deviceHeading !== null ? bear - deviceHeading : bear}deg)`;

    const status = document.getElementById('compass-status');
    if (status) {
      status.textContent = deviceHeading !== null ? '✓ Stap in deze richting' : '⚠ Geen kompas — beweeg voor richting';
      status.style.color = 'var(--muted)';
    }

    const arrivedWrap = document.getElementById('arrived-wrap');
    if (arrivedWrap && dist <= a.radius && !arrivedWrap.innerHTML) {
      arrivedWrap.innerHTML = `<div class="arrived-banner"><div class="arrived-icon">★</div><div class="arrived-title">Obiettivo Raggiunto</div><div class="arrived-sub">U bevindt zich op de doellocatie.</div></div>`;
    }
  }
</script>
