<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operazione Moro — Beheer</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1208;
    --surface: #231a0a;
    --surface2: #2e2210;
    --border: #6b4c1e;
    --border-light: #4a3010;
    --red: #c0152a;
    --red-dim: #8a0f1e;
    --text: #f0e6c8;
    --muted: #a08050;
    --paper: #f0e6c8;
    --paper-dark: #d9cc9a;
    --ink: #1a1208;
    --danger: #c0152a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Courier Prime', monospace;
    background: var(--bg); color: var(--text); min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(255,255,255,0.012) 28px, rgba(255,255,255,0.012) 29px);
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--red);
    padding: 0.9rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: 'Special Elite', cursive;
    font-size: 1.2rem; color: var(--text); letter-spacing: 0.04em;
  }
  .logo span { color: var(--red); }
  .admin-badge {
    font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); border: 1px solid var(--border);
    padding: 0.3rem 0.7rem;
  }

  /* ── LAYOUT ── */
  .admin-layout {
    display: grid; grid-template-columns: 1fr 380px;
    gap: 1.5rem; padding: 1.5rem; max-width: 1200px; margin: 0 auto;
  }

  /* ── PANELS ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border-light);
    padding: 1.5rem;
  }
  .panel-title {
    font-family: 'Special Elite', cursive;
    font-size: 0.95rem; color: var(--red);
    letter-spacing: 0.06em; margin-bottom: 1.2rem;
    padding-bottom: 0.6rem; border-bottom: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-title-sub {
    font-family: 'Courier Prime', monospace;
    font-size: 0.6rem; color: var(--muted);
    letter-spacing: 0.1em; font-weight: 400;
  }

  /* ── FORM ── */
  .form-group { margin-bottom: 1rem; }
  label {
    display: block; font-size: 0.62rem; color: var(--muted);
    margin-bottom: 0.35rem; letter-spacing: 0.12em; text-transform: uppercase;
  }
  input[type=text], input[type=number], textarea {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border-light);
    color: var(--text); font-family: 'Courier Prime', monospace;
    font-size: 0.9rem; padding: 0.6rem 0.8rem; outline: none;
    transition: border-color 0.2s;
  }
  input:focus, textarea:focus { border-color: var(--red); }
  textarea { resize: vertical; min-height: 75px; }
  .coords-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

  /* ── MODE TOGGLE ── */
  .mode-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem; }
  .mode-btn {
    padding: 0.65rem; border: 1px solid var(--border-light);
    background: var(--surface2); color: var(--muted); cursor: pointer;
    font-family: 'Courier Prime', monospace; font-size: 0.8rem;
    text-align: center; transition: all 0.2s; letter-spacing: 0.05em;
  }
  .mode-btn:hover { border-color: var(--red); color: var(--text); }
  .mode-btn.active { background: var(--red); color: var(--paper); border-color: var(--red); }

  /* ── BUTTONS ── */
  .btn-primary {
    width: 100%; padding: 0.8rem; margin-top: 0.5rem;
    background: var(--red); color: var(--paper); border: none;
    font-family: 'Special Elite', cursive; font-size: 0.95rem; cursor: pointer;
    letter-spacing: 0.05em; box-shadow: 3px 3px 0 var(--red-dim); transition: all 0.15s;
  }
  .btn-primary:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--red-dim); }
  .btn-secondary {
    width: 100%; padding: 0.7rem; margin-top: 0.4rem;
    background: transparent; border: 1px solid var(--border-light); color: var(--muted);
    font-family: 'Courier Prime', monospace; font-size: 0.85rem; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.05em;
  }
  .btn-secondary:hover { border-color: var(--muted); color: var(--text); }
  .btn-danger {
    background: var(--red-dim); color: var(--paper); border: none;
    padding: 0.3rem 0.65rem; font-size: 0.75rem; cursor: pointer;
    font-family: 'Courier Prime', monospace; transition: all 0.2s;
  }
  .btn-danger:hover { background: var(--red); }

  /* ── GEO ── */
  .geo-btn {
    background: transparent; border: 1px solid var(--border-light); color: var(--muted);
    padding: 0.35rem 0.7rem; font-size: 0.7rem; font-family: 'Courier Prime', monospace;
    cursor: pointer; margin-top: 0.4rem; transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .geo-btn:hover { border-color: var(--red); color: var(--red); }
  .geo-hint { font-size: 0.68rem; color: var(--muted); margin-top: 0.3rem; letter-spacing: 0.05em; }

  /* ── ASSIGNMENT LIST ── */
  .assignment-list { display: flex; flex-direction: column; gap: 0.6rem; }

  .assignment-card {
    background: var(--surface2); border: 1px solid var(--border-light);
    border-left: 3px solid transparent;
    padding: 0.8rem 1rem;
    display: flex; align-items: center; gap: 0.8rem;
    cursor: pointer; transition: all 0.2s;
  }
  .assignment-card:hover { border-left-color: var(--red); }
  .assignment-card.editing { border-left-color: var(--red); background: rgba(192,21,42,0.06); }
  .assignment-card.dragging { opacity: 0.4; border: 1px dashed var(--border); }
  .assignment-card.drag-over { border-left-color: var(--muted); background: rgba(160,128,80,0.06); }

  .drag-handle { cursor: grab; color: var(--border); font-size: 0.9rem; flex-shrink: 0; user-select: none; }
  .drag-handle:active { cursor: grabbing; }

  .card-num {
    width: 28px; height: 28px; background: var(--surface); border: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; color: var(--red); flex-shrink: 0; font-family: 'Special Elite', cursive;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-family: 'Special Elite', cursive; font-size: 0.9rem; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-meta { font-size: 0.65rem; color: var(--muted); margin-top: 0.15rem; letter-spacing: 0.04em; }
  .mode-badge {
    font-size: 0.6rem; padding: 0.15rem 0.4rem; flex-shrink: 0;
    letter-spacing: 0.06em; border: 1px solid;
  }
  .mode-badge.compass { border-color: rgba(160,128,80,0.4); color: var(--muted); }
  .mode-badge.map { border-color: rgba(58,90,32,0.5); color: #6a9a40; }
  .card-actions { display: flex; gap: 0.3rem; flex-shrink: 0; }

  /* ── EMPTY / SAVING ── */
  .empty-state {
    text-align: center; padding: 2.5rem 1rem; color: var(--muted);
    font-size: 0.75rem; border: 1px dashed var(--border-light);
    letter-spacing: 0.08em; line-height: 1.8;
  }
  .saving-indicator { font-size: 0.65rem; color: var(--muted); text-align: center; margin-top: 0.5rem; min-height: 1rem; letter-spacing: 0.08em; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface); border: 1px solid var(--red); border-left: 3px solid var(--red);
    color: var(--text); padding: 0.7rem 1.4rem;
    font-size: 0.8rem; z-index: 999; letter-spacing: 0.05em;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--red); color: #ff8080; }

  @media (max-width: 768px) { .admin-layout { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div class="logo">Operazione <span>Moro</span> — Beheer</div>
  <div class="admin-badge">⚙ Leerkracht</div>
</header>

<div class="admin-layout">

  <!-- Form panel -->
  <div class="panel">
    <div class="panel-title" id="form-panel-title">
      Nieuwe opdracht
      <span class="panel-title-sub">INVOER</span>
    </div>

    <div class="form-group">
      <label>Naam opdracht</label>
      <input type="text" id="inp-name" placeholder="bv. Via Caetani">
    </div>

    <div class="form-group">
      <label>Beschrijving / instructie voor leerling</label>
      <textarea id="inp-desc" placeholder="bv. Zoek de plek waar het lichaam van Moro werd gevonden..."></textarea>
    </div>

    <div class="form-group">
      <label>Weergavemodus</label>
      <div class="mode-toggle">
        <div class="mode-btn active" id="mode-compass" onclick="selectMode('compass')">🧭 Peiling + afstand</div>
        <div class="mode-btn" id="mode-map" onclick="selectMode('map')">🗺 Adres + kaartje</div>
      </div>
    </div>

    <div class="form-group" id="group-address" style="display:none;">
      <label>Adres (voor leerling zichtbaar)</label>
      <input type="text" id="inp-address" placeholder="bv. Via Caetani, Roma">
    </div>

    <div class="form-group">
      <label>GPS Coördinaten</label>
      <div class="coords-row">
        <input type="number" id="inp-lat" placeholder="Breedtegraad" step="0.000001">
        <input type="number" id="inp-lng" placeholder="Lengtegraad" step="0.000001">
      </div>
      <button class="geo-btn" onclick="useCurrentLocation()">📍 Gebruik huidige locatie</button>
      <div class="geo-hint" id="geo-hint"></div>
    </div>

    <div class="form-group">
      <label>Aankomstradius (meter)</label>
      <input type="number" id="inp-radius" value="25" min="5" max="500">
    </div>

    <button class="btn-primary" onclick="saveAssignment()">Opdracht opslaan</button>
    <button class="btn-secondary" onclick="cancelEdit()">Annuleren</button>
    <div class="saving-indicator" id="saving-indicator"></div>
  </div>

  <!-- List panel -->
  <div class="panel">
    <div class="panel-title">
      Opdrachten
      <span class="panel-title-sub"><span id="count">0</span> DOSSIERS · SLEEP OM TE HERORDENEN</span>
    </div>
    <div class="assignment-list" id="assignment-list">
      <div class="empty-state">Geen opdrachten.<br>Voeg er een toe.</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC_2gs99Sao2zdxa_JsRd9fNUFg-MVcXgw",
    authDomain: "rome-maffia.firebaseapp.com",
    projectId: "rome-maffia",
    storageBucket: "rome-maffia.firebasestorage.app",
    messagingSenderId: "68269167339",
    appId: "1:68269167339:web:43f9f177f38af954fce4ae",
    measurementId: "G-5J1MY47CG1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let assignments = [], selectedMode = 'compass', editingId = null, dragSrcIndex = null;

  function toast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 2500);
  }
  function setSaving(msg) { document.getElementById('saving-indicator').textContent = msg; }

  window.selectMode = function(m) {
    selectedMode = m;
    document.getElementById('mode-compass').classList.toggle('active', m === 'compass');
    document.getElementById('mode-map').classList.toggle('active', m === 'map');
    document.getElementById('group-address').style.display = m === 'map' ? 'block' : 'none';
  };

  window.useCurrentLocation = function() {
    if (!navigator.geolocation) { toast('Geolocatie niet ondersteund', true); return; }
    document.getElementById('geo-hint').textContent = 'Locatie ophalen...';
    navigator.geolocation.getCurrentPosition(pos => {
      document.getElementById('inp-lat').value = pos.coords.latitude.toFixed(6);
      document.getElementById('inp-lng').value = pos.coords.longitude.toFixed(6);
      document.getElementById('geo-hint').textContent = '✓ Locatie ingevuld';
      setTimeout(() => document.getElementById('geo-hint').textContent = '', 2000);
    }, () => { document.getElementById('geo-hint').textContent = '✗ Geen toegang'; });
  };

  const q = query(collection(db, "assignments"), orderBy("order", "asc"));
  onSnapshot(q, snapshot => {
    assignments = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('count').textContent = assignments.length;
    renderAdminList();
  });

  window.saveAssignment = async function() {
    const name = document.getElementById('inp-name').value.trim();
    const desc = document.getElementById('inp-desc').value.trim();
    const lat = parseFloat(document.getElementById('inp-lat').value);
    const lng = parseFloat(document.getElementById('inp-lng').value);
    const radius = parseInt(document.getElementById('inp-radius').value) || 25;
    const address = document.getElementById('inp-address').value.trim();

    if (!name) { toast('Voer een naam in', true); return; }
    if (isNaN(lat) || isNaN(lng)) { toast('Voer geldige coördinaten in', true); return; }

    setSaving('Opslaan...');
    try {
      const data = { name, desc, lat, lng, radius, mode: selectedMode, address };
      if (editingId) {
        await updateDoc(doc(db, "assignments", editingId), data);
        toast('Opdracht bijgewerkt');
      } else {
        data.order = assignments.length;
        await addDoc(collection(db, "assignments"), data);
        toast('Opdracht toegevoegd');
      }
      setSaving(''); resetForm();
    } catch (e) { setSaving(''); toast('Fout: ' + e.message, true); }
  };

  window.editAssignment = function(id) {
    const a = assignments.find(x => x.id === id);
    if (!a) return;
    editingId = id;
    document.getElementById('inp-name').value = a.name;
    document.getElementById('inp-desc').value = a.desc || '';
    document.getElementById('inp-lat').value = a.lat;
    document.getElementById('inp-lng').value = a.lng;
    document.getElementById('inp-radius').value = a.radius || 25;
    document.getElementById('inp-address').value = a.address || '';
    selectMode(a.mode || 'compass');
    document.getElementById('form-panel-title').innerHTML = 'Opdracht bewerken <span class="panel-title-sub">BEWERKEN</span>';
    document.querySelectorAll('.assignment-card').forEach(c => c.classList.remove('editing'));
    document.getElementById('card-' + id)?.classList.add('editing');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.deleteAssignment = async function(id) {
    if (!confirm('Opdracht verwijderen?')) return;
    try {
      await deleteDoc(doc(db, "assignments", id));
      if (editingId === id) resetForm();
      toast('Opdracht verwijderd');
    } catch (e) { toast('Fout: ' + e.message, true); }
  };

  window.cancelEdit = resetForm;
  function resetForm() {
    editingId = null;
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-desc').value = '';
    document.getElementById('inp-lat').value = '';
    document.getElementById('inp-lng').value = '';
    document.getElementById('inp-radius').value = '25';
    document.getElementById('inp-address').value = '';
    document.getElementById('form-panel-title').innerHTML = 'Nieuwe opdracht <span class="panel-title-sub">INVOER</span>';
    selectMode('compass');
    document.querySelectorAll('.assignment-card').forEach(c => c.classList.remove('editing'));
  }

  function renderAdminList() {
    const list = document.getElementById('assignment-list');
    if (!assignments.length) {
      list.innerHTML = `<div class="empty-state">Geen opdrachten.<br>Voeg er een toe.</div>`;
      return;
    }
    list.innerHTML = assignments.map((a, i) => `
      <div class="assignment-card" id="card-${a.id}"
        draggable="true"
        ondragstart="dragStart(event,${i})"
        ondragover="dragOver(event,${i})"
        ondragleave="dragLeave(event)"
        ondrop="dragDrop(event,${i})"
        ondragend="dragEnd(event)"
        onclick="editAssignment('${a.id}')">
        <span class="drag-handle" title="Sleep om te herordenen">⠿</span>
        <div class="card-num">${String(i+1).padStart(2,'0')}</div>
        <div class="card-info">
          <div class="card-name">${a.name}</div>
          <div class="card-meta">${a.lat?.toFixed(4)}, ${a.lng?.toFixed(4)} · r=${a.radius}m</div>
        </div>
        <span class="mode-badge ${a.mode}">${a.mode === 'compass' ? 'peiling' : 'kaart'}</span>
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="btn-danger" onclick="deleteAssignment('${a.id}')">✕</button>
        </div>
      </div>
    `).join('');
  }

  window.dragStart = function(e, i) {
    dragSrcIndex = i;
    setTimeout(() => e.target.closest('.assignment-card').classList.add('dragging'), 0);
  };
  window.dragOver = function(e, i) {
    e.preventDefault();
    document.querySelectorAll('.assignment-card').forEach(c => c.classList.remove('drag-over'));
    if (i !== dragSrcIndex) e.target.closest('.assignment-card')?.classList.add('drag-over');
  };
  window.dragLeave = function(e) { e.target.closest('.assignment-card')?.classList.remove('drag-over'); };
  window.dragDrop = async function(e, targetIndex) {
    e.preventDefault();
    if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;
    const reordered = [...assignments];
    const [moved] = reordered.splice(dragSrcIndex, 1);
    reordered.splice(targetIndex, 0, moved);
    setSaving('Volgorde opslaan...');
    try {
      const batch = writeBatch(db);
      reordered.forEach((a, idx) => batch.update(doc(db, "assignments", a.id), { order: idx }));
      await batch.commit();
      setSaving('');
    } catch (e) { setSaving(''); toast('Fout bij herordenen', true); }
  };
  window.dragEnd = function(e) {
    document.querySelectorAll('.assignment-card').forEach(c => { c.classList.remove('dragging'); c.classList.remove('drag-over'); });
    dragSrcIndex = null;
  };
</script>
</body>
</html>
