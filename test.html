<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operazione Moro — Test</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1208; --paper: #f0e6c8; --paper-dark: #d9cc9a;
    --surface: #231a0a; --surface2: #2e2210;
    --border: #6b4c1e; --border-light: #4a3010;
    --red: #c0152a; --red-dim: #8a0f1e;
    --text: #f0e6c8; --muted: #a08050; --ink: #1a1208;
    --green: #6a9a40; --green-dim: #3a5a20;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Courier Prime', monospace;
    background: var(--bg); color: var(--text); min-height: 100vh;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(255,255,255,0.015) 28px, rgba(255,255,255,0.015) 29px);
  }

  /* ── LOGIN ── */
  .login-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 2rem; }
  .login-box { background: var(--surface); border: 2px solid var(--red); padding: 2.5rem 2rem; max-width: 360px; width: 100%; box-shadow: 6px 6px 0 var(--red-dim); position: relative; }
  .login-box::before { content: 'ACCESSO RISERVATO'; position: absolute; top: -0.7rem; left: 1rem; background: var(--red); color: var(--paper); font-size: 0.6rem; padding: 0.15rem 0.6rem; letter-spacing: 0.2em; }
  .login-title { font-family: 'Special Elite', cursive; font-size: 1.4rem; color: var(--text); margin-bottom: 0.4rem; }
  .login-sub { font-size: 0.78rem; color: var(--muted); margin-bottom: 1.5rem; letter-spacing: 0.04em; line-height: 1.6; }
  .login-input { width: 100%; background: var(--surface2); border: 1px solid var(--border-light); color: var(--text); font-family: 'Courier Prime', monospace; font-size: 1.1rem; padding: 0.7rem 0.9rem; outline: none; letter-spacing: 0.15em; margin-bottom: 0.8rem; transition: border-color 0.2s; }
  .login-input:focus { border-color: var(--red); }
  .login-btn { width: 100%; padding: 0.85rem; background: var(--red); color: var(--paper); border: none; font-family: 'Special Elite', cursive; font-size: 1rem; cursor: pointer; box-shadow: 3px 3px 0 var(--red-dim); transition: all 0.15s; letter-spacing: 0.05em; }
  .login-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--red-dim); }
  .login-error { font-size: 0.8rem; color: var(--red); margin-top: 0.6rem; min-height: 1.2rem; letter-spacing: 0.05em; }

  /* ── HEADER ── */
  header { background: var(--red); position: relative; overflow: hidden; }
  .header-rule { height: 4px; background: var(--bg); }
  .header-rule-thin { height: 1px; background: rgba(0,0,0,0.3); margin-top: 2px; }
  .header-inner { display: flex; flex-direction: column; align-items: center; padding: 1rem 1rem 0.8rem; position: relative; z-index: 1; }
  .header-eyebrow { font-size: 0.75rem; letter-spacing: 0.25em; color: rgba(240,230,200,0.6); text-transform: uppercase; margin-bottom: 0.2rem; }
  .header-title { font-family: 'Special Elite', cursive; font-size: 1.8rem; color: var(--paper); text-shadow: 2px 2px 0 rgba(0,0,0,0.4); }
  .header-sub { font-size: 0.72rem; color: rgba(240,230,200,0.7); letter-spacing: 0.2em; margin-top: 0.2rem; text-transform: uppercase; }
  header::after { content: '★'; position: absolute; right: -10px; top: -10px; font-size: 120px; color: rgba(0,0,0,0.12); line-height: 1; pointer-events: none; }

  /* ── LAYOUT ── */
  .layout { max-width: 800px; margin: 0 auto; padding: 1.5rem; display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem; }
  @media (max-width: 700px) { .layout { grid-template-columns: 1fr; } }

  /* ── PANEL ── */
  .panel { background: var(--surface); border: 1px solid var(--border-light); padding: 1.2rem; }
  .panel-title { font-family: 'Special Elite', cursive; font-size: 0.95rem; color: var(--red); letter-spacing: 0.06em; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-light); }

  /* ── GROUP SELECTOR ── */
  .group-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; margin-bottom: 1rem; }
  .group-btn { padding: 0.6rem; border: 1px solid var(--border-light); background: var(--surface2); color: var(--muted); cursor: pointer; font-family: 'Special Elite', cursive; font-size: 0.9rem; text-align: center; transition: all 0.15s; }
  .group-btn:hover { border-color: var(--red); color: var(--text); }
  .group-btn.active { background: var(--red); border-color: var(--red); color: var(--paper); }
  .current-group { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 1rem; }

  /* ── LOCATION LIST ── */
  .loc-list { display: flex; flex-direction: column; gap: 0.4rem; }
  .loc-item {
    padding: 0.7rem 0.9rem; border: 1px solid var(--border-light);
    border-left: 3px solid transparent;
    display: flex; align-items: center; gap: 0.7rem;
    cursor: pointer; transition: all 0.15s; background: var(--surface2);
  }
  .loc-item:hover:not(.locked) { border-left-color: var(--red); }
  .loc-item.active-loc { border-left-color: var(--red); background: rgba(192,21,42,0.08); }
  .loc-item.done { border-left-color: var(--green); opacity: 0.7; }
  .loc-item.locked { opacity: 0.35; cursor: not-allowed; }
  .loc-symbol { font-size: 1rem; width: 24px; text-align: center; flex-shrink: 0; }
  .loc-name { font-family: 'Special Elite', cursive; font-size: 0.9rem; flex: 1; }
  .loc-status { font-size: 0.7rem; flex-shrink: 0; }

  /* ── DIVIDER ── */
  .section-divider { display: flex; align-items: center; gap: 0.6rem; margin: 0.6rem 0 0.4rem; }
  .section-divider span { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap; }
  .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border-light); }

  /* ── DOSSIER ── */
  .dossier { background: var(--paper); border: 1px solid var(--paper-dark); box-shadow: 3px 3px 12px rgba(0,0,0,0.5); padding: 1.5rem; position: relative; }
  .dossier::before { content: 'DOSSIER RISERVATO'; position: absolute; top: 0.6rem; right: 0.8rem; font-size: 0.6rem; color: var(--red); opacity: 0.5; letter-spacing: 0.15em; }
  .dossier-header { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.6rem; }
  .dossier-symbol { font-size: 2rem; color: var(--red); flex-shrink: 0; }
  .dossier-label { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.15rem; }
  .dossier-title { font-family: 'Special Elite', cursive; font-size: 1.6rem; color: var(--ink); line-height: 1.2; border-bottom: 2px solid var(--red); padding-bottom: 0.5rem; }
  .dossier-desc { color: #3a2810; font-size: 0.95rem; line-height: 1.7; margin-top: 0.6rem; }

  /* ── SIM BUTTON ── */
  .sim-section { margin-top: 1.2rem; padding-top: 1rem; border-top: 1px solid var(--paper-dark); }
  .sim-label { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.6rem; }
  .btn-arrive {
    width: 100%; padding: 0.85rem; background: var(--red); color: var(--paper); border: none;
    font-family: 'Special Elite', cursive; font-size: 1rem; cursor: pointer;
    box-shadow: 3px 3px 0 var(--red-dim); transition: all 0.15s; letter-spacing: 0.05em;
  }
  .btn-arrive:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--red-dim); }
  .btn-arrive:disabled { background: var(--muted); box-shadow: none; cursor: default; transform: none; }
  .btn-reset { width: 100%; padding: 0.65rem; margin-top: 0.5rem; background: transparent; border: 1px solid var(--border-light); color: var(--muted); font-family: 'Courier Prime', monospace; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
  .btn-reset:hover { border-color: var(--red); color: var(--red); }

  /* ── ARRIVED BANNER ── */
  .arrived-banner { background: var(--paper); border: 3px solid var(--red); padding: 1.5rem 1.2rem 1.2rem; text-align: center; margin-top: 1.2rem; box-shadow: 4px 4px 0 var(--red-dim); position: relative; }
  .arrived-banner::before { content: '★  LOCATIE BEREIKT  ★'; position: absolute; top: -0.65rem; left: 50%; transform: translateX(-50%); background: var(--red); color: var(--paper); font-size: 0.65rem; padding: 0.1rem 0.7rem; letter-spacing: 0.15em; white-space: nowrap; }
  .arrived-icon { font-size: 2.2rem; color: var(--red); }
  .arrived-title { font-family: 'Special Elite', cursive; font-size: 1.3rem; color: var(--red); margin-top: 0.4rem; }

  /* ── AUDIO ── */
  .audio-player { margin-top: 1rem; border-top: 1px solid var(--paper-dark); padding-top: 0.8rem; }
  .audio-label { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.4rem; }
  .audio-player audio { width: 100%; height: 36px; accent-color: var(--red); }

  /* ── QUESTION ── */
  .question-block { margin-top: 1rem; border-top: 2px solid var(--red); padding-top: 0.9rem; text-align: left; }
  .question-label { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.4rem; }
  .question-text { font-family: 'Special Elite', cursive; font-size: 1rem; color: var(--ink); margin-bottom: 0.7rem; line-height: 1.5; }
  .question-input-row { display: flex; gap: 0.5rem; }
  .question-input { flex: 1; background: white; border: 2px solid var(--paper-dark); color: var(--ink); font-family: 'Courier Prime', monospace; font-size: 1rem; padding: 0.55rem 0.7rem; outline: none; transition: border-color 0.2s; }
  .question-input:focus { border-color: var(--red); }
  .question-input:disabled { background: #f5f0e0; color: var(--muted); }
  .question-submit { background: var(--red); color: var(--paper); border: none; padding: 0.55rem 1rem; font-size: 1.1rem; cursor: pointer; box-shadow: 2px 2px 0 var(--red-dim); transition: all 0.15s; flex-shrink: 0; }
  .question-submit:hover:not(:disabled) { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--red-dim); }
  .question-submit:disabled { background: var(--muted); box-shadow: none; cursor: default; }
  .question-feedback { margin-top: 0.7rem; font-size: 0.9rem; line-height: 1.6; padding: 0.5rem 0.7rem; display: none; font-family: 'Courier Prime', monospace; color: var(--ink); border-left: 3px solid var(--muted); background: rgba(160,128,80,0.08); }
  .question-feedback.show { display: block; }

  /* ── UNLOCKED ── */
  .unlocked-notice { background: var(--surface); border: 1px solid var(--border-light); border-left: 3px solid var(--green); padding: 0.8rem 1rem; margin-top: 0.8rem; font-size: 0.9rem; color: var(--green); letter-spacing: 0.05em; }

  /* ── EMPTY / PLACEHOLDER ── */
  .placeholder { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 0.85rem; letter-spacing: 0.08em; border: 1px dashed var(--border-light); line-height: 1.8; }
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--surface); border: 1px solid var(--red); border-left: 3px solid var(--red); color: var(--text); padding: 0.7rem 1.4rem; font-size: 0.85rem; z-index: 999; letter-spacing: 0.05em; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Login overlay -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="login-title">Testomgeving</div>
    <div class="login-sub">Voer de toegangscode in om verder te gaan.</div>
    <input type="password" class="login-input" id="login-input" placeholder="••••••••" onkeydown="if(event.key==='Enter') submitLogin()">
    <button class="login-btn" onclick="submitLogin()">Toegang verkrijgen</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<header>
  <div class="header-rule"></div>
  <div class="header-rule-thin"></div>
  <div class="header-inner">
    <div class="header-eyebrow">Brigata Investigativa — Roma</div>
    <div class="header-title">Operazione Moro</div>
    <div class="header-sub">Testomgeving · Simulatie zonder GPS</div>
  </div>
  <div class="header-rule-thin"></div>
  <div class="header-rule"></div>
</header>

<div class="layout">
  <!-- Left: group + location list -->
  <div>
    <div class="panel" style="margin-bottom:1rem;">
      <div class="panel-title">Groep selecteren</div>
      <div class="group-grid" id="group-grid"></div>
      <div class="current-group" id="current-group-label"></div>
    </div>
    <div class="panel">
      <div class="panel-title">Locaties</div>
      <div class="loc-list" id="loc-list">
        <div class="placeholder">Selecteer een groep.</div>
      </div>
    </div>
  </div>

  <!-- Right: dossier detail -->
  <div id="detail-panel">
    <div class="placeholder" style="border:1px dashed var(--border-light);padding:3rem 1rem;">
      Selecteer een groep en klik op een locatie om te simuleren.
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const CORRECT_HASH = '6ed18fc042aa11963191bb25592a4525338096c0d4c315eb4262c3b7459c1ccc';
  const SESSION_KEY = 'moro-beheer-auth';

  async function hashString(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  async function submitLogin() {
    const val = document.getElementById('login-input').value;
    const hash = await hashString(val);
    if (hash === CORRECT_HASH) {
      sessionStorage.setItem(SESSION_KEY, '1');
      document.getElementById('login-overlay').style.display = 'none';
    } else {
      document.getElementById('login-error').textContent = 'Toegangscode onjuist.';
      document.getElementById('login-input').value = '';
      document.getElementById('login-input').focus();
    }
  }
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('login-overlay').style.display = 'none';
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show';
    setTimeout(() => t.className = 'toast', 2500);
  }
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, onSnapshot, query, orderBy, setDoc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC_2gs99Sao2zdxa_JsRd9fNUFg-MVcXgw",
    authDomain: "rome-maffia.firebaseapp.com",
    projectId: "rome-maffia",
    storageBucket: "rome-maffia.firebasestorage.app",
    messagingSenderId: "68269167339",
    appId: "1:68269167339:web:43f9f177f38af954fce4ae"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const NUM_GROUPS = 10;
  let assignments = [];
  let currentGroup = null;
  let groupProgress = [];
  let groupAnswers = {};
  let activeId = null;

  // ── Load assignments ──
  const q = query(collection(db, 'assignments'), orderBy('order', 'asc'));
  onSnapshot(q, snap => {
    assignments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderLocList();
    if (activeId) showDetail(activeId);
  });

  // ── Group buttons ──
  const groupGrid = document.getElementById('group-grid');
  for (let i = 1; i <= NUM_GROUPS; i++) {
    const btn = document.createElement('div');
    btn.className = 'group-btn';
    btn.textContent = `Groep ${i}`;
    btn.onclick = () => selectGroup(`groep-${i}`, btn);
    groupGrid.appendChild(btn);
  }

  async function selectGroup(groupId, btn) {
    currentGroup = groupId;
    activeId = null;
    document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('current-group-label').textContent =
      `Actief: ${groupId.replace('groep-', 'Groep ')}`;
    document.getElementById('detail-panel').innerHTML =
      `<div class="placeholder" style="border:1px dashed var(--border-light);padding:3rem 1rem;">Klik op een beschikbare locatie.</div>`;

    // Listen to group progress
    const groupRef = doc(db, 'groups', currentGroup);
    onSnapshot(groupRef, docSnap => {
      if (!docSnap.exists()) {
        setDoc(groupRef, { completed: [], answers: {}, lastSeen: new Date().toISOString() }).catch(() => {});
        groupProgress = []; groupAnswers = {};
      } else {
        groupProgress = docSnap.data()?.completed || [];
        groupAnswers = docSnap.data()?.answers || {};
      }
      renderLocList();
      if (activeId) showDetail(activeId);
    });
  }

  // ── Visibility logic (AND) ──
  function isVisible(a) {
    if (a.visibleTo && a.visibleTo.length > 0 && !a.visibleTo.includes(currentGroup)) return false;
    if (!a.unlockedBy || a.unlockedBy.length === 0) return true;
    return a.unlockedBy.every(id => groupProgress.includes(id));
  }
  function isCompleted(a) { return groupProgress.includes(a.id); }

  // ── Render location list ──
  function renderLocList() {
    const list = document.getElementById('loc-list');
    if (!currentGroup) { list.innerHTML = `<div class="placeholder">Selecteer een groep.</div>`; return; }

    const relevant = assignments.filter(a =>
      !a.visibleTo || a.visibleTo.length === 0 || a.visibleTo.includes(currentGroup)
    );
    if (!relevant.length) { list.innerHTML = `<div class="placeholder">Geen locaties voor deze groep.</div>`; return; }

    const active = relevant.filter(a => isVisible(a) && !isCompleted(a));
    const done = relevant.filter(a => isCompleted(a));
    const locked = relevant.filter(a => !isVisible(a) && !isCompleted(a));

    let html = '';

    active.forEach(a => {
      html += locItemHTML(a, 'active', a.id === activeId ? 'active-loc' : '');
    });

    if (done.length) {
      html += `<div class="section-divider"><span>Bezocht</span></div>`;
      done.forEach(a => { html += locItemHTML(a, 'done', a.id === activeId ? 'active-loc' : ''); });
    }

    if (locked.length) {
      html += `<div class="section-divider"><span>Vergrendeld</span></div>`;
      locked.forEach(a => { html += locItemHTML(a, 'locked', ''); });
    }

    list.innerHTML = html;
  }

  function locItemHTML(a, state, extra) {
    const onclick = state !== 'locked' ? `onclick="window._showDetail('${a.id}')"` : '';
    const status = state === 'done' ? '✓' : state === 'locked' ? '🔒' : '›';
    return `<div class="loc-item ${state} ${extra}" ${onclick}>
      <div class="loc-symbol">${a.symbol || '★'}</div>
      <div class="loc-name">${a.name}</div>
      <div class="loc-status">${status}</div>
    </div>`;
  }

  window._showDetail = function(id) { showDetail(id); };

  function showDetail(id) {
    const a = assignments.find(x => x.id === id);
    if (!a || !currentGroup) return;
    activeId = id;
    renderLocList(); // update active highlight

    const done = isCompleted(a);
    const answerStatus = groupAnswers[a.id];

    let questionHTML = '';
    if (a.question) {
      if (answerStatus !== undefined) {
        const feedbackText = answerStatus.correct ? (a.answerText || '✓ Correct.') : 'Ga naar de volgende locatie.';
        questionHTML = `
          <div class="question-block">
            <div class="question-label">▋ Vraag</div>
            <div class="question-text">${a.question}</div>
            <div class="question-feedback show">${feedbackText}</div>
          </div>`;
      } else if (done) {
        questionHTML = `
          <div class="question-block">
            <div class="question-label">▋ Vraag</div>
            <div class="question-text">${a.question}</div>
            <div class="question-input-row">
              <input type="text" class="question-input" id="answer-input-${a.id}" placeholder="Uw antwoord..." onkeydown="if(event.key==='Enter') window._checkAnswer('${a.id}')">
              <button class="question-submit" onclick="window._checkAnswer('${a.id}')">→</button>
            </div>
            <div class="question-feedback" id="answer-feedback-${a.id}"></div>
          </div>`;
      }
    }

    // Which assignments does this unlock?
    const unlocks = assignments.filter(x => (x.unlockedBy || []).includes(a.id));
    const unlockNotice = done && unlocks.length > 0
      ? `<div class="unlocked-notice">✦ Vrijgegeven na bezoek: ${unlocks.map(x => x.name).join(', ')}</div>`
      : '';

    const arrivedSection = done ? `
      <div class="arrived-banner">
        <div class="arrived-icon">${a.symbol || '★'}</div>
        <div class="arrived-title">Locatie bereikt</div>
        ${a.audio ? `<div class="audio-player">
          <div class="audio-label">▶ Intercepted transmission</div>
          <audio controls src="${a.audio}"></audio>
        </div>` : ''}
        ${questionHTML}
      </div>
      ${unlockNotice}` : '';

    const simSection = !done ? `
      <div class="sim-section">
        <div class="sim-label">Simulatie</div>
        <button class="btn-arrive" onclick="window._simulateArrive('${a.id}')">
          Simuleer aankomst op deze locatie
        </button>
      </div>` : `
      <div class="sim-section">
        <div class="sim-label">Simulatie</div>
        <button class="btn-arrive" disabled>✓ Locatie reeds bezocht</button>
        <button class="btn-reset" onclick="window._resetLoc('${a.id}', '${a.name}')">Voortgang van deze locatie wissen</button>
      </div>`;

    document.getElementById('detail-panel').innerHTML = `
      <div class="dossier">
        <div class="dossier-label">Missie dossier</div>
        <div class="dossier-header">
          <div class="dossier-symbol">${a.symbol || '★'}</div>
          <div class="dossier-title">${a.name}</div>
        </div>
        <div class="dossier-desc">${a.desc || ''}</div>
        ${simSection}
      </div>
      ${arrivedSection}`;
  }

  // ── Simulate arrival ──
  window._simulateArrive = async function(id) {
    if (!currentGroup) return;
    const groupRef = doc(db, 'groups', currentGroup);
    await updateDoc(groupRef, {
      completed: arrayUnion(id),
      lastSeen: new Date().toISOString()
    }).catch(async () => {
      // Doc may not exist yet
      await setDoc(groupRef, { completed: [id], answers: {}, lastSeen: new Date().toISOString() });
    });
    toast('Aankomst gesimuleerd ✓');
  };

  // ── Check answer ──
  window._checkAnswer = async function(assignmentId) {
    const a = assignments.find(x => x.id === assignmentId);
    if (!a || groupAnswers[assignmentId] !== undefined) return;
    const input = document.getElementById(`answer-input-${assignmentId}`);
    const feedback = document.getElementById(`answer-feedback-${assignmentId}`);
    const btn = document.querySelector(`#answer-input-${assignmentId} ~ button`) ||
                input?.parentElement?.querySelector('button');
    if (!input || !feedback) return;
    input.disabled = true;
    if (btn) btn.disabled = true;
    const given = input.value.trim().toLowerCase();
    const correct = (a.answer || '').trim().toLowerCase();
    const isCorrect = given === correct;
    try {
      const groupRef = doc(db, 'groups', currentGroup);
      await updateDoc(groupRef, {
        [`answers.${assignmentId}`]: { correct: isCorrect },
        lastSeen: new Date().toISOString()
      });
    } catch (e) { console.warn('Answer save failed:', e); }
    feedback.className = 'question-feedback show';
    feedback.innerHTML = isCorrect ? (a.answerText || '✓ Correct.') : 'Ga naar de volgende locatie.';
  };

  // ── Reset single location ──
  window._resetLoc = async function(id, name) {
    if (!confirm(`Voortgang van "${name}" wissen voor ${currentGroup.replace('groep-', 'Groep ')}?`)) return;
    try {
      const groupRef = doc(db, 'groups', currentGroup);
      const snap = await getDoc(groupRef);
      if (!snap.exists()) return;
      const completed = (snap.data().completed || []).filter(x => x !== id);
      const answers = snap.data().answers || {};
      delete answers[id];
      await updateDoc(groupRef, { completed, answers });
      activeId = id;
      toast(`"${name}" gewist`);
    } catch (e) { toast('Fout: ' + e.message); }
  };
</script>
</body>
</html>
